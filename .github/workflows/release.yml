name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zyraxbuster-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zyraxbuster-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: zyraxbuster-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: zyraxbuster-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: zyraxbuster-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/zyraxbuster ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/zyraxbuster.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create checksums
        run: |
          find . -type f -not -name '*.sha256' -not -name '.git*' -not -name 'CHANGELOG*' -not -name 'CONTRIBUTING*' -not -name 'LICENSE*' -not -name 'README*' -not -name 'SECURITY*' -not -name 'Cargo*' | while read f; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.version.outputs.tag }}"
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # Write to file for multiline output
          echo "$NOTES" > /tmp/release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZyraxBuster ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.txt
          draft: false
          prerelease: false
          files: |
            zyraxbuster-linux-x86_64
            zyraxbuster-linux-x86_64.sha256
            zyraxbuster-linux-aarch64
            zyraxbuster-linux-aarch64.sha256
            zyraxbuster-macos-x86_64
            zyraxbuster-macos-x86_64.sha256
            zyraxbuster-macos-aarch64
            zyraxbuster-macos-aarch64.sha256
            zyraxbuster-windows-x86_64.exe
            zyraxbuster-windows-x86_64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
